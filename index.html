<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記帳軟體</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入自訂 CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#F8FAFC]">

    <div class="min-h-screen bg-[#F8FAFC] flex flex-col items-center pb-20 font-sans text-slate-800">
        <div class="w-full max-w-lg bg-white min-h-screen shadow-2xl border-x border-slate-100">
            
            <!-- 頂部導覽與切換 -->
            <div class="sticky top-0 z-20 bg-white/95 backdrop-blur-md border-b p-4">
                <div class="flex justify-between items-center mb-4">
                    <div class="flex bg-slate-100 rounded-xl p-1 font-bold text-xs">
                        <span class="px-5 py-1.5 bg-white shadow-sm text-slate-900 rounded-lg">月度明細</span>
                    </div>
                </div>
                <div class="flex items-center justify-center gap-10 font-black">
                    <span id="currentMonthYear" class="text-xl tracking-tight">載入中...</span>
                </div>
            </div>

            <div class="p-4 space-y-6">
                <!-- 狀態提示區 -->
                <div id="statusMessage" class="hidden bg-sky-50 text-sky-700 text-xs py-3 px-4 rounded-xl text-center font-bold"></div>

                <!-- 統計資訊與分頁選擇 -->
                <div class="bg-white rounded-[2rem] border border-slate-100 shadow-sm overflow-hidden">
                    <div class="flex border-b font-bold text-sm bg-slate-50/50">
                        <button id="tabIncome" class="flex-1 py-4 transition-all border-b-2 border-transparent text-slate-400">收入</button>
                        <button id="tabExpense" class="flex-1 py-4 transition-all border-b-2 border-rose-500 text-rose-600 bg-rose-50/30">支出</button>
                    </div>
                    <div class="p-6">
                        <div class="grid grid-cols-2 gap-4 border-b border-slate-100 pb-6">
                            <div class="text-center border-r border-slate-100">
                                <div class="text-xs text-slate-400 font-bold mb-1">本月收入</div>
                                <div id="totalIncome" class="text-2xl font-black text-emerald-600 tracking-tight">$0</div>
                            </div>
                            <div class="text-center">
                                <div class="text-xs text-slate-400 font-bold mb-1">本月支出</div>
                                <div id="totalExpense" class="text-2xl font-black text-rose-600 tracking-tight">$0</div>
                            </div>
                        </div>
                        
                        <!-- 類別摘要分佈 -->
                        <div id="categorySummaryList" class="space-y-5 mt-4"></div>
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-500">掃描帳單</label>
                    <div class="flex gap-2">
                        <input type="file" id="pdfUpload" accept=".pdf" class="block w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-black file:bg-violet-50 file:text-violet-700 hover:file:bg-violet-100" />
                        <button type="button" id="aiScanBtn" class="px-4 py-2 bg-violet-600 hover:bg-violet-700 text-white rounded-xl text-xs font-black shadow-md transition-all active:scale-95">
                            AI 辨識
                        </button>
                    </div>
                    <div id="aiStatus" class="hidden text-[10px] font-bold text-violet-600 animate-pulse">辨識帳單中</div>
                </div>
                <!-- 手動記帳表單卡片 -->
                <div class="bg-white rounded-[1.5rem] border border-slate-100 shadow-sm overflow-hidden">
                    <button id="toggleFormBtn" class="w-full p-5 flex justify-between items-center text-sm font-bold hover:bg-slate-50 transition-colors">
                        <span class="flex items-center gap-2 font-black text-slate-700">
                            <svg class="text-rose-500 stroke-[3] w-5 h-5" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg> 
                            新增
                        </span>
                        <svg id="formArrowIcon" class="w-5 h-5 transition-transform" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" /></svg>
                    </button>
                    
                    <div id="manualFormContainer" class="hidden">
                        <form id="transactionForm" class="p-6 border-t bg-slate-50/30 space-y-4 font-bold">
                            <!-- 交易類型按鈕組 -->
                            <div class="flex bg-slate-100 rounded-xl p-1 text-xs font-bold w-full">
                                <button type="button" id="typeExpenseBtn" class="flex-1 py-2 rounded-lg transition-all text-center bg-white shadow-sm text-rose-600">支出</button>
                                <button type="button" id="typeIncomeBtn" class="flex-1 py-2 rounded-lg transition-all text-center text-slate-400 hover:text-slate-600">收入</button>
                                <button type="button" id="typeTransferBtn" class="flex-1 py-2 rounded-lg transition-all text-center text-slate-400 hover:text-slate-600">移轉</button>
                            </div>
                            <input type="hidden" id="txType" value="expense">

                            <!-- 分類選擇 -->
                            <div class="grid grid-cols-1 gap-3 text-sm">
                                <select id="categorySelect" class="w-full p-3 rounded-xl border-0 bg-white shadow-sm ring-1 ring-slate-100 outline-none font-bold text-slate-700"></select>
                            </div>

                            <!-- 日期與描述 -->
                            <div class="flex gap-2">
                                <input type="date" id="txDate" class="w-[45%] p-3 text-sm rounded-xl border-0 bg-white shadow-sm ring-1 ring-slate-100 font-bold" required>
                                <input type="text" id="txDesc" placeholder="明細" class="flex-1 p-3 text-sm rounded-xl border-0 bg-white shadow-sm ring-1 ring-slate-100 outline-none font-bold">
                            </div>

                            <!-- 金幕與即時計算功能 -->
                            <div class="flex gap-3 flex-col">
                                <div class="relative">
                                    <input 
                                        type="text" 
                                        id="txAmount" 
                                        inputMode="decimal"
                                        placeholder="金額 (可輸入算式)" 
                                        class="w-full p-4 pr-10 text-xl rounded-xl border-0 bg-white shadow-md ring-1 ring-slate-100 font-black outline-none focus:ring-rose-500"
                                        required
                                    >
                                    <svg class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-300 w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M15.75 15.75h.008v.008h-.008v-.008zm0-2.25h.008v.008h-.008v-.008zm0-2.25h.008v.008h-.008v-.008zm0-2.25h.008v.008h-.008v-.008zm-2.25 6.75h.008v.008h-.008v-.008zm0-2.25h.008v.008h-.008v-.008zm0-2.25h.008v.008h-.008v-.008zm0-2.25h.008v.008h-.008v-.008zm-2.25 6.75h.008v.008h-.008v-.008zm0-2.25h.008v.008h-.008v-.008zm0-2.25h.008v.008h-.008v-.008zm0-2.25h.008v.008h-.008v-.008zm-2.25 6.75h.008v.008h-.008v-.008zm0-2.25h.008v.008h-.008v-.008zm0-2.25h.008v.008h-.008v-.008zm0-2.25h.008v.008h-.008v-.008zM6.75 3h10.5a2.25 2.25 0 012.25 2.25v13.5a2.25 2.25 0 01-2.25 2.25H6.75a2.25 2.25 0 01-2.25-2.25V5.25A2.25 2.25 0 016.75 3z" /></svg>
                                </div>
                                <div id="calcPreview" class="hidden text-right text-xs text-slate-500 font-bold -mt-2 pr-2"></div>
                                <button type="submit" id="submitBtn" class="w-full py-4 text-white rounded-xl text-sm font-black shadow-xl active:scale-95 transition-all bg-rose-600 hover:bg-rose-700">
                                    儲存
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- 明細列表 -->
                <div class="space-y-3 pb-10">
                    <div class="flex justify-between items-center px-1.5 py-1">
                        <span class="text-sm font-black text-slate-700">歷史明細</span>
                        <span id="itemsCountText" class="text-xs font-bold text-slate-400">本月共 0 筆明細</span>
                    </div>
                    
                    <!-- 這裡是動態生成每筆記帳明細的容器 -->
                    <div id="recordsContainer" class="space-y-3"></div>
                </div>

            </div>
        </div>
    </div>

    <!-- 引入核心邏輯 JavaScript -->
    <script src="script.js"></script>
</body>
</html>
